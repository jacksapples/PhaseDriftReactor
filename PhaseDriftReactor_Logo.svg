<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep space -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="60%" stop-color="#0a0d1f"/>
      <stop offset="100%" stop-color="#020308"/>
    </radialGradient>

    <!-- Pillar gradient: obsidian -->
    <linearGradient id="pillar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a2a"/>
      <stop offset="50%" stop-color="#2a2a3f"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>

    <!-- Pillar highlight edge -->
    <linearGradient id="pillarEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7b3fbf" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Containment ring gradient: cyan-violet -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#a080ff"/>
      <stop offset="100%" stop-color="#ff60c0"/>
    </linearGradient>

    <!-- Core glow -->
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#a0e8ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4080ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle ring glow filter -->
    <filter id="ringGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="coreGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#2a3550" stroke-width="1" stroke-opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#grid)"/>

  <!-- Subtle particles in background -->
  <circle cx="180" cy="220" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="850" cy="180" r="1.5" fill="#a0e8ff" opacity="0.5"/>
  <circle cx="120" cy="800" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="900" cy="850" r="1.5" fill="#a0e8ff" opacity="0.5"/>
  <circle cx="250" cy="150" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="780" cy="900" r="1.5" fill="#ffffff" opacity="0.4"/>

  <!-- Bottom hex base -->
  <polygon points="512,860 720,755 720,545 512,440 304,545 304,755"
           fill="#0a0a14" stroke="#3a4a70" stroke-width="2"/>
  <polygon points="512,860 720,755 720,545 512,440 304,545 304,755"
           fill="url(#pillar)" opacity="0.6"/>

  <!-- Main hexagonal pillar body -->
  <polygon points="512,720 660,640 660,400 512,320 364,400 364,640"
           fill="url(#pillar)" stroke="#3a4a70" stroke-width="3"/>

  <!-- Pillar edge highlight (left) -->
  <polyline points="364,400 512,320 660,400" fill="none"
            stroke="url(#pillarEdge)" stroke-width="4" opacity="0.8"/>

  <!-- Vertical edge lines on pillar -->
  <line x1="364" y1="400" x2="364" y2="640" stroke="#3a4a70" stroke-width="2"/>
  <line x1="660" y1="400" x2="660" y2="640" stroke="#3a4a70" stroke-width="2"/>
  <line x1="512" y1="320" x2="512" y2="720" stroke="#1f2840" stroke-width="1" opacity="0.6"/>

  <!-- Pillar panel detail lines (sci-fi) -->
  <line x1="420" y1="450" x2="604" y2="450" stroke="#5a6a90" stroke-width="1" opacity="0.4"/>
  <line x1="420" y1="500" x2="604" y2="500" stroke="#5a6a90" stroke-width="1" opacity="0.4"/>
  <line x1="420" y1="550" x2="540" y2="550" stroke="#5a6a90" stroke-width="1" opacity="0.4"/>
  <line x1="420" y1="600" x2="540" y2="600" stroke="#5a6a90" stroke-width="1" opacity="0.4"/>

  <!-- Small status LEDs on the pillar -->
  <circle cx="600" cy="450" r="3" fill="#00ff88"/>
  <circle cx="600" cy="500" r="3" fill="#00f0ff"/>
  <circle cx="540" cy="550" r="3" fill="#a080ff" opacity="0.6"/>

  <!-- Containment ring (large) -->
  <g filter="url(#ringGlow)">
    <ellipse cx="512" cy="280" rx="240" ry="80"
             fill="none" stroke="url(#ring)" stroke-width="6"
             transform="rotate(0 512 280)"/>
  </g>

  <!-- Secondary tilted containment ring -->
  <g filter="url(#ringGlow)">
    <ellipse cx="512" cy="280" rx="220" ry="60"
             fill="none" stroke="#00f0ff" stroke-width="3"
             opacity="0.7" transform="rotate(25 512 280)"/>
  </g>

  <!-- Tertiary tilted containment ring -->
  <g filter="url(#ringGlow)">
    <ellipse cx="512" cy="280" rx="220" ry="60"
             fill="none" stroke="#a080ff" stroke-width="3"
             opacity="0.6" transform="rotate(-25 512 280)"/>
  </g>

  <!-- Core glow at center -->
  <g filter="url(#coreGlow)">
    <circle cx="512" cy="280" r="80" fill="url(#core)"/>
  </g>

  <!-- Bright core point -->
  <circle cx="512" cy="280" r="20" fill="#ffffff"/>
  <circle cx="512" cy="280" r="12" fill="#e0f8ff"/>

  <!-- Energy beams from core down to pillar -->
  <g opacity="0.6">
    <line x1="512" y1="320" x2="450" y2="400" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="512" y1="320" x2="512" y2="400" stroke="#a080ff" stroke-width="2"/>
    <line x1="512" y1="320" x2="574" y2="400" stroke="#00f0ff" stroke-width="1.5"/>
  </g>

  <!-- Top antenna spike -->
  <line x1="512" y1="240" x2="512" y2="180" stroke="#7a8aa0" stroke-width="3"/>
  <circle cx="512" cy="170" r="6" fill="#ff60c0" filter="url(#ringGlow)"/>

  <!-- Hexagonal frame corner accents -->
  <g stroke="#5a8fff" stroke-width="2" fill="none" opacity="0.5">
    <polyline points="40,40 40,90 90,90"/>
    <polyline points="984,40 984,90 934,90"/>
    <polyline points="40,984 40,934 90,934"/>
    <polyline points="984,984 984,934 934,934"/>
  </g>
</svg>